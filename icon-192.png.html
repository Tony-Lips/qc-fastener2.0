<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Save icon-192.png</title></head>
<body>
<img id="icon" style="image-rendering:pixelated; image-rendering:crisp-edges;">
<script>
const canvas = document.createElement('canvas');
canvas.width = 192;
canvas.height = 192;
const ctx = canvas.getContext('2d');

// Фон
ctx.fillStyle = '#1a1a2e';
ctx.fillRect(0, 0, 192, 192);

// Золотая рамка
ctx.strokeStyle = '#F5B041';
ctx.lineWidth = 4;
ctx.strokeRect(8, 8, 176, 176);

// Золотой болт/гайка (шестигранник)
ctx.fillStyle = '#F5B041';
ctx.beginPath();
for (let i = 0; i < 6; i++) {
  const angle = (i * 60 - 30) * Math.PI / 180;
  const x = 96 + 40 * Math.cos(angle);
  const y = 96 + 40 * Math.sin(angle);
  if (i === 0) ctx.moveTo(x, y);
  else ctx.lineTo(x, y);
}
ctx.closePath();
ctx.fill();

// Круг внутри
ctx.fillStyle = '#1a1a2e';
ctx.beginPath();
ctx.arc(96, 96, 24, 0, 2 * Math.PI);
ctx.fill();

// Крестик (символ контроля)
ctx.strokeStyle = '#F5B041';
ctx.lineWidth = 5;
ctx.beginPath();
ctx.moveTo(96, 84);
ctx.lineTo(96, 108);
ctx.moveTo(84, 96);
ctx.lineTo(108, 96);
ctx.stroke();

// Буква Q
ctx.font = 'bold 42px "Inter", "Segoe UI", sans-serif';
ctx.fillStyle = '#F5B041';
ctx.fillText('Q', 96 - 22, 96 + 14);

// Тень
ctx.shadowBlur = 0;

// Круглые уголки
const img = canvas.toDataURL('image/png');
document.getElementById('icon').src = img;
document.write('<p><a href="'+img+'" download="icon-192.png">Скачать icon-192.png</a></p>');
document.write('<p><img src="'+img+'" style="border:1px solid #ccc;"></p>');
</script>
</body>
</html>
